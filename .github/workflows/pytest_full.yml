name: PyTest for all SciPy minor versions

on:
  push:
    branches: ["main"]

defaults:
  run:
    shell: bash -e {0}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        name: Initialize matrix
        run: |
          # 使用 Shell 生成 JSON 对象列表
          JSON_STUFF=$( (
            # Py 3.10: 1.7 ~ 1.15
            for v in $(seq 7 15); do echo "{\"python\":\"3.10\",\"scipy\":\"1.$v\"}"; done
            # Py 3.11: 1.10 ~ 1.17
            for v in $(seq 10 17); do echo "{\"python\":\"3.11\",\"scipy\":\"1.$v\"}"; done
            # Py 3.12: 1.11 ~ 1.18
            for v in $(seq 11 18); do echo "{\"python\":\"3.12\",\"scipy\":\"1.$v\"}"; done
            # Py 3.13: 1.15 ~ 1.18
            for v in $(seq 15 18); do echo "{\"python\":\"3.13\",\"scipy\":\"1.$v\"}"; done
            # Py 3.14: 1.16 ~ 1.18
            for v in $(seq 16 18); do echo "{\"python\":\"3.14\",\"scipy\":\"1.$v\"}"; done
          ) | jq -sc '{"include": .}' )

          echo "matrix=$JSON_STUFF" >> $GITHUB_OUTPUT
  test:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    name: python ${{ matrix.python }}, scipy ${{ matrix.scipy }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.11.27"
          python-version: ${{ matrix.python }}

      - name: Update the environment and test with python ${{ matrix.python }} and SciPy ${{ matrix.scipy }}
        run: |
          uv sync --locked --group dev
          uv pip install scipy~=${{ matrix.scipy }}.0 --no-build
          uv run --frozen pytest --cov=pystatpower --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: test-full-py${{ matrix.python }}-scipy${{ matrix.scipy }}
