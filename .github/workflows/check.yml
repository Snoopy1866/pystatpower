name: Test

on:
  push:
    branches:
      - "main"
  pull_request:
    types: [opened, synchronize, reopened]

defaults:
  run:
    shell: bash -e {0}

jobs:
  test-core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          python-version: ${{ matrix.python-version }}

      - name: Install the project
        run: uv sync --locked --group dev

      - name: Test with python ${{ matrix.python-version }}
        run: |
          uv run --frozen pytest --cov=pystatpower --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}

  test-dependency:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        deps:
          - python-version: 3.11
            scipy-version: 1.14.0
          - python-version: 3.12
            scipy-version: 1.14.0
          - python-version: 3.13
            scipy-version: 1.14.0
          - python-version: 3.14
            scipy-version: 1.14.0

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          python-version: ${{ matrix.deps.python-version }}

      - name: Install the project
        run: uv sync --locked --group dev

      - name: Install SciPy
        run: uv pip install scipy==${{ matrix.deps.scipy-version }} --no-build

      - name: Test with python ${{ matrix.deps.python-version }}
        run: |
          uv run --frozen pytest --cov=pystatpower --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}-scipy${{ matrix.scipy-version }}
