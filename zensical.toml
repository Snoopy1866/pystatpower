site_name = "pystatpower"
site_url = "https://pystatpower.readthedocs.io"
site_author = "Snoopy1866"
repo_url = "https://github.com/Snoopy1866/pystatpower"
edit_uri = "edit/main/docs/"
copyright = "copyright &copy; 2024 - 2026 Snoopy1866"
docs_dir = "docs"
site_dir = "site"
extra_css = ["stylesheets/extra.css"]
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]


[project.theme]
language = "zh"
features = [
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.code.select",
    "content.code.annotate",
    "content.tabs.link",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.tracking",
    "navigation.tabs",
    "navigation.sections",
    "navigation.path",
    "navigation.prune",
    "navigation.top",
    "toc.follow",
    "toc.integrate",
    "search.highlight",
    "header.autohide"
]

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"


[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tabbed.slugify]
object = "pymdownx.slugs.slugify"
kwds = { case = "lower" }
[project.markdown_extensions.def_list]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.toc]
permalink = true
permalink_title = "指向本节的链接"
[project.markdown_extensions.footnotes]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.tables]

[project.plugins.mkdocstrings.handlers.python]
inventories = [
    "https://docs.python.org/3/objects.inv",
    "https://docs.scipy.org/doc/scipy/objects.inv"
]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
# General
backlinks = "tree"
show_source = false

# Headings
heading_level = 1
parameter_headings = false
show_root_heading = true
show_root_toc_entry = false
show_root_full_path = true
show_root_members_full_path = false
show_symbol_type_heading = true
show_symbol_type_toc = true

# Members
inherited_members = true
members_order = "source"
filters = ["!^_"]
group_by_category = true

# Docstrings
docstring_style = "google"
docstring_options.ignore_init_summary = true
docstring_section_style = "spacy"
merge_init_into_class = true
relative_crossrefs = true
scoped_crossrefs = true

# Signatures
line_length = 120
show_signature = true
show_signature_annotations = true
separate_signature = true
signature_crossrefs = true

[project.plugins.mkdocstrings.handlers.python.options.summary]
attributes = false
functions = true
modules = false

[project.plugins.autorefs]

[project.validation]
unresolved_references = false
